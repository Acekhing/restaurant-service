resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API reverse proxy
    location /api/ {
        set $api http://api:8080;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $api;
    }

    # Swagger UI (proxied as-is since the API serves it at /swagger)
    location /swagger {
        set $api http://api:8080;
        proxy_pass $api;
    }

    # Waiter portal SPA
    location /waiter/ {
        alias /usr/share/nginx/html/waiter/;
        try_files $uri $uri/ /waiter/index.html;
    }

    # Backoffice SPA
    location /backoffice/ {
        alias /usr/share/nginx/html/backoffice/;
        try_files $uri $uri/ /backoffice/index.html;
    }

    # Main frontend SPA (catch-all)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
