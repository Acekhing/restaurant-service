resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name portal.stpis.edu.gh;

    client_max_body_size 10M;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /admin/ {
        set $admin http://admin-api:8080;
        rewrite ^/admin/(.*) /$1 break;
        proxy_pass $admin;
    }

    location /student/ {
        set $student http://student-api:8080;
        rewrite ^/student/(.*) /$1 break;
        proxy_pass $student;
    }

    location /teachers/ {
        set $teachers http://teachers-api:8080;
        rewrite ^/teachers/(.*) /$1 break;
        proxy_pass $teachers;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name portal.stpis.edu.gh;

    ssl_certificate     /etc/letsencrypt/live/portal.stpis.edu.gh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.stpis.edu.gh/privkey.pem;

    client_max_body_size 10M;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /admin/ {
        set $admin http://admin-api:8080;
        rewrite ^/admin/(.*) /$1 break;
        proxy_pass $admin;
    }

    location /student/ {
        set $student http://student-api:8080;
        rewrite ^/student/(.*) /$1 break;
        proxy_pass $student;
    }

    location /teachers/ {
        set $teachers http://teachers-api:8080;
        rewrite ^/teachers/(.*) /$1 break;
        proxy_pass $teachers;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
