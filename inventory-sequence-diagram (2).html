<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Service — Sequence Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #090b0f;
    --surface:   #0f1218;
    --surface2:  #161b24;
    --border:    #1e2530;
    --border2:   #263040;

    --txt-primary:   #e8edf5;
    --txt-secondary: #7a8a9e;
    --txt-muted:     #3d4f63;

    --blue:      #3d8ef0;
    --blue-dim:  #1a3a6a;
    --blue-bg:   #0a1828;

    --purple:    #9d7fea;
    --purple-dim:#3a2870;
    --purple-bg: #0e0a20;

    --amber:     #e8a838;
    --amber-dim: #5a3d0e;
    --amber-bg:  #140e02;

    --green:     #5ab86c;
    --green-dim: #1a4024;
    --green-bg:  #060e08;

    --gray-line: #2a3545;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--txt-primary);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--txt-primary);
    letter-spacing: 0.02em;
  }
  header span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--txt-muted);
  }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid;
    margin-left: auto;
  }
  .tag.blue   { color: var(--blue);   border-color: var(--blue-dim);   background: var(--blue-bg); }
  .tag.purple { color: var(--purple); border-color: var(--purple-dim); background: var(--purple-bg); }
  .tag.amber  { color: var(--amber);  border-color: var(--amber-dim);  background: var(--amber-bg); }
  .tag.green  { color: var(--green);  border-color: var(--green-dim);  background: var(--green-bg); }

  /* ── Scroll wrapper ── */
  .scroll-wrap {
    overflow-x: auto;
    padding: 32px 32px 48px;
  }

  /* ── Diagram SVG ── */
  svg { display: block; font-family: var(--mono); }

  /* Participant boxes */
  .p-box    { fill: var(--surface2); stroke: var(--border2); stroke-width: 1; }
  .p-box-blue   { fill: var(--blue-bg);   stroke: var(--blue-dim); }
  .p-box-purple { fill: var(--purple-bg); stroke: var(--purple-dim); stroke-width: 1.2; }
  .p-box-amber  { fill: var(--amber-bg);  stroke: var(--amber-dim); }
  .p-box-green  { fill: var(--green-bg);  stroke: var(--green-dim); }

  .p-label       { fill: var(--txt-secondary); font-size: 9px; font-weight: 500; }
  .p-label-blue  { fill: var(--blue); }
  .p-label-purple{ fill: var(--purple); }
  .p-label-amber { fill: var(--amber); }
  .p-label-green { fill: var(--green); }

  /* Lifelines */
  .lifeline { stroke: var(--gray-line); stroke-width: 0.5; stroke-dasharray: 4 6; }
  .lifeline-purple { stroke: var(--purple-dim); stroke-width: 0.5; stroke-dasharray: 4 6; }
  .lifeline-amber  { stroke: var(--amber-dim);  stroke-width: 0.5; stroke-dasharray: 4 6; }
  .lifeline-green  { stroke: var(--green-dim);  stroke-width: 0.5; stroke-dasharray: 4 6; }

  /* Section bands */
  .band-write  { fill: rgba(157,127,234,0.04); stroke: var(--purple-dim); stroke-width: 0.5; stroke-dasharray: 4 4; }
  .band-relay  { fill: rgba(232,168,56,0.04);  stroke: var(--amber-dim);  stroke-width: 0.5; stroke-dasharray: 4 4; }
  .band-kafka  { fill: rgba(90,184,108,0.04);  stroke: var(--green-dim);  stroke-width: 0.5; stroke-dasharray: 4 4; }
  .band-read   { fill: rgba(61,142,240,0.04);  stroke: var(--blue-dim);   stroke-width: 0.5; stroke-dasharray: 4 4; }

  .band-label         { font-size: 8px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .band-label-purple  { fill: var(--purple); }
  .band-label-amber   { fill: var(--amber); }
  .band-label-green   { fill: var(--green); }
  .band-label-blue    { fill: var(--blue); }
  .band-sublabel      { fill: var(--txt-muted); font-size: 7px; }

  /* Arrows */
  .arr-def    { stroke: var(--gray-line); stroke-width: 1.2; fill: none; }
  .arr-blue   { stroke: var(--blue);   stroke-width: 1.2; fill: none; }
  .arr-purple { stroke: var(--purple); stroke-width: 1.6; fill: none; }
  .arr-amber  { stroke: var(--amber);  stroke-width: 1.2; fill: none; }
  .arr-green  { stroke: var(--green);  stroke-width: 1.2; fill: none; }
  .arr-dashed { stroke-dasharray: 5 3; }

  /* Arrow labels */
  .lbl-num  { fill: var(--txt-muted); font-size: 7.5px; font-weight: 600; }
  .lbl-def  { fill: var(--txt-secondary); font-size: 8px; }
  .lbl-blue  { fill: var(--blue);   font-size: 8px; }
  .lbl-purple{ fill: var(--purple); font-size: 8px; font-weight: 500; }
  .lbl-amber { fill: var(--amber);  font-size: 8px; }
  .lbl-green { fill: var(--green);  font-size: 8px; }

  /* Commit pill */
  .commit-bg  { fill: var(--purple-bg); stroke: var(--purple-dim); stroke-width: 0.5; }
  .commit-txt { fill: var(--purple); font-size: 7.5px; }

  /* Group label boxes at top */
  .grp-blue   { fill: var(--blue-bg);   stroke: var(--blue-dim);   stroke-width: 0.5; }
  .grp-gray   { fill: var(--surface2);  stroke: var(--border);     stroke-width: 0.5; }
  .grp-amber  { fill: var(--amber-bg);  stroke: var(--amber-dim);  stroke-width: 0.5; }
  .grp-green  { fill: var(--green-bg);  stroke: var(--green-dim);  stroke-width: 0.5; }
</style>
</head>
<body>

<header>
  <h1>inventory-service</h1>
  <span>sequence diagram</span>
  <div style="display:flex;gap:8px;margin-left:auto;flex-wrap:wrap">

    <span class="tag amber">outbox relay</span>
    <span class="tag green">consumers</span>
    <span class="tag blue">read side</span>
  </div>
</header>
